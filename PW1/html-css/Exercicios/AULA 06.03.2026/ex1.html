<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de alunos</title>
</head>


<table border="1">
 <caption>Cadastro de alunos</caption>
<thead>
    
<tr>
<th>Nome </th>
<th>Idade </th>
<th>Cursos </th>
</tr>
</thead>

<tr>
<td>Ana</td>
<td>18</td>
<td>ads</td>
</tr>

<tr>
<td>Alexandriny</td>
<td>19</td>
<td>ds</td>
</tr>
</table>
<h3>CADASTRO DO USUARIO</h3>

<form>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label for="email">Email:</label>
    <input type="text" id="email" required><br><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade"> <br><br>

    <label for="curso">Curso:</label>
    <input type="text" id="curso" required><br><br>

<button type="submit">Enviar</button>
<select id ="curso">
    <option>INFORMATICA</option>
    <option>ADS</option>
    <option>CCO</option>
</select>

</form>

</body>
</html>

<!--
<td> = cria uma célula 
<tr> = agrupa as células em uma tabela
<thead> = define o cabeçalho da tabela.
<table border="1"> = cria uma tabela com borda
<caption> = cria um titulo para a tabela
<label> = rotulo 
<input> = campo
<select> = lista
<option> = itens da minha lista
-->
